<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metal Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d2ff; --bg: #020617; --card-bg: #1e293b; --success: #22c55e; --nav-bg: #0f172a; }
        body { background-color: var(--bg); margin: 0; padding: 0; color: white; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-content { display: none; padding: 15px; overflow-y: auto; flex: 1; padding-bottom: 90px; }
        .tab-content.active { display: block; }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); 
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .clock { color: #94a3b8; font-size: 14px; font-weight: 500; }
        
        .sync-btn { 
            background: var(--accent); color: #020617; border: none; padding: 10px 18px; 
            border-radius: 12px; font-weight: 800; font-size: 13px; cursor: pointer;
        }

        /* Scrap Page - New Clean Layout */
        .scrap-row { 
            display: flex; 
            align-items: center; 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            border-left: 4px solid var(--success);
            font-size: 14px;
        }
        .scrap-number { color: #64748b; font-weight: 800; width: 25px; flex-shrink: 0; }
        .scrap-name { flex: 1; font-weight: 700; text-transform: uppercase; padding: 0 10px; }
        .scrap-divider { color: rgba(255,255,255,0.1); padding: 0 8px; }
        .scrap-price-box { display: flex; align-items: baseline; gap: 4px; font-weight: 800; color: var(--success); }
        .scrap-unit { font-size: 10px; color: #94a3b8; font-weight: 400; }

        .status-pill { font-size: 14px; font-weight: 800; padding: 6px 12px; border-radius: 8px; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); display: inline-block; margin-top: 8px; }
        .m-live { color: var(--success); border-color: rgba(34, 197, 94, 0.4); background: rgba(34, 197, 94, 0.1); }
    </style>
</head>
<body>

<div id="live-tab" class="tab-content active">
    <div class="header">
        <div>
            <h2 style="margin: 0; color: var(--accent); font-size: 18px;">Metal Intelligence</h2>
            <div id="cambodia-clock" class="clock">Phnom Penh: --:--</div>
            <div class="status-pill" id="status-container"><span id="status-text">CONNECTING</span></div>
        </div>
        <button class="sync-btn" onclick="location.reload()">SYNC</button>
    </div>
    <p style="color:#94a3b8; font-size:12px;">Live LME & Forex data active.</p>
</div>

<div id="scrap-tab" class="tab-content">
    <h2 style="color:var(--success); margin-bottom: 5px;">Scrap Buying Prices</h2>
    <div id="scrap-update-time" style="font-size: 10px; color: #94a3b8; margin-bottom: 15px; font-weight: bold;">Live Sync: --:--</div>
    
    <div id="scrap-items-container">
        </div>
</div>

<div id="contact-tab" class="tab-content">
    <h2 style="color:var(--accent);">Contact Office</h2>
    <div class="scrap-row" style="margin-top:20px; border-left-color: var(--accent); cursor: pointer;" onclick="window.location.href='https://wa.me/YOUR_NUMBER'">
        <div class="scrap-name">WHATSAPP PROCUREMENT</div>
        <div class="scrap-icon">💬</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('live-tab', this)"><span class="nav-icon">📊</span><span>LIVE</span></div>
    <div class="nav-item" onclick="switchTab('scrap-tab', this)"><span class="nav-icon">🚜</span><span>SCRAP</span></div>
    <div class="nav-item" onclick="switchTab('contact-tab', this)"><span class="nav-icon">💬</span><span>CHAT</span></div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0qs7QDwbVZConK0gaGtudJg1jcODhyMR57qUZP0NNe_WwfnT9BHFWA6lJeLrZ_Yiv/exec";

    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(tabId === 'scrap-tab') fetchScrapPrices();
    }

    function fetchScrapPrices() {
        const container = document.getElementById('scrap-items-container');
        const oldScript = document.getElementById('jsonp-script');
        if (oldScript) oldScript.remove();
        const script = document.createElement('script');
        script.id = 'jsonp-script';
        script.src = GOOGLE_SCRIPT_URL + "?callback=window.callback&v=" + Date.now();
        document.body.appendChild(script);
    }

    window.callback = function(data) {
        const container = document.getElementById('scrap-items-container');
        let html = '';
        data.forEach((item, index) => {
            html += `
                <div class="scrap-row">
                    <div class="scrap-number">${index + 1}.</div>
                    <div class="scrap-name">${item.name}</div>
                    <div class="scrap-divider">|</div>
                    <div class="scrap-price-box">
                        <span>${item.price}</span>
                        <span class="scrap-unit">(${item.unit || 'KHR'})</span>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
        document.getElementById('scrap-update-time').innerText = "Live Sync: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    };

    function updateClock() {
        const clock = document.getElementById('cambodia-clock');
        const now = new Date();
        clock.innerText = "Phnom Penh: " + now.toLocaleTimeString('en-US', {timeZone:'Asia/Phnom_Penh', hour:'numeric', minute:'2-digit', hour12:true});
        
        // London Market Status
        const lonH = parseInt(new Intl.DateTimeFormat('en-GB', {timeZone:'Europe/London', hour:'numeric', hour12:false}).format(now));
        const lonD = new Intl.DateTimeFormat('en-GB', {timeZone:'Europe/London', weekday:'short'}).format(now);
        const open = !['Sat','Sun'].includes(lonD) && (lonH >= 1 && lonH < 19);
        const statusText = document.getElementById('status-text');
        const statusContainer = document.getElementById('status-container');
        
        if (open) {
            statusText.innerText = "● MARKET LIVE";
            statusContainer.className = "status-pill m-live";
        } else {
            statusText.innerText = "○ MARKET CLOSED";
            statusContainer.className = "status-pill";
        }
    }

    setInterval(updateClock, 30000);
    updateClock();
    fetchScrapPrices();
</script>
</body>
</html>
